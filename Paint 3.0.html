<!doctype html><html><head><style type="text/css">body {
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: 'Segoe UI', Arial, sans-serif;
    margin: 0;
    padding: 20px;
    transition: background-color 0.3s;
}

body.light {
    background-color: #f3f3f3;
}

body.dark {
    background-color: #1e1e1e;
    color: #fff;
}

#toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    padding: 15px;
    background-color: #ffffff;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    margin-bottom: 20px;
    transition: background-color 0.3s;
}

body.dark #toolbar {
    background-color: #2d2d2d;
}

#canvas {
    border: 1px solid #ddd;
    background-color: #fff;
    border-radius: 8px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
    cursor: crosshair;
    transition: background-color 0.3s;
}

body.dark #canvas {
    border-color: #444;
}

.tool, button {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    background-color: #f0f0f0;
    cursor: pointer;
    font-size: 14px;
    transition: background-color 0.2s, transform 0.1s;
}

.tool:hover, button:hover {
    background-color: #e0e0e0;
    transform: translateY(-2px);
}

body.dark .tool, body.dark button {
    background-color: #3a3a3a;
    color: #fff;
}

body.dark .tool:hover, body.dark button:hover {
    background-color: #4a4a4a;
}

.tool.active {
    background-color: #0078d4;
    color: white;
}

input[type="color"] {
    width: 50px;
    height: 50px;
    border: none;
    padding: 0;
    cursor: pointer;
    border-radius: 50%;
    transition: transform 0.2s;
}

input[type="color"]:hover {
    transform: scale(1.1);
}

input[type="range"] {
    width: 120px;
    accent-color: #0078d4;
}

input[type="text"], input[type="number"], select {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
    transition: border-color 0.2s;
}

body.dark input[type="text"], body.dark input[type="number"], body.dark select {
    background-color: #3a3a3a;
    border-color: #555;
    color: #fff;
}

input[type="text"]:focus, input[type="number"]:focus, select:focus {
    border-color: #0078d4;
    outline: none;
}

.hidden {
    display: none;
}

#proActivation {
    margin-left: auto;
}

#proTools.active {
    display: flex;
    gap: 10px;
}

#settingsPanel {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background-color: #fff;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 6px 25px rgba(0, 0, 0, 0.2);
    z-index: 1000;
    width: 400px;
    max-height: 80vh;
    overflow-y: auto;
    transition: background-color 0.3s;
}

body.dark #settingsPanel {
    background-color: #2d2d2d;
}

.settings-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.settings-header h3 {
    margin: 0;
    font-size: 20px;
}

.close-btn {
    background: none;
    border: none;
    font-size: 18px;
    cursor: pointer;
    padding: 5px;
}

body.dark .close-btn {
    color: #fff;
}

.settings-content label {
    display: block;
    margin: 15px 0 5px;
    font-weight: 500;
}

.settings-content button {
    margin: 20px 10px 0 0;
}</style></head><body><!DOCTYPE html>
<html lang="pl">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Paint Pro</title>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<div id="toolbar">
		<div id="basicTools">
			<button id="brushBtn" class="tool active">Pdzel</button>
			<button id="eraserBtn" class="tool">Gumka</button>
			<button id="lineBtn" class="tool">Linia</button>
			<button id="rectBtn" class="tool">Prostokt</button>
			<button id="circleBtn" class="tool">KoBo</button>
			<input type="color" id="colorPicker" value="#000000" title="Kolor obramowania">
			<input type="color" id="fillColorPicker" value="#ffffff" disabled title="Kolor wypeBnienia">
			<input type="range" id="lineWidth" min="1" max="50" value="5" title="Grubo[ linii">
			<button id="clearBtn">Wyczy[</button>
			<button id="saveBtn">Zapisz</button>
			<button id="settingsBtn">Ustawienia</button>
		</div>
		<div id="proTools" class="hidden">
			<button id="textBtn" class="tool">Tekst</button>
			<button id="fillBtn" class="tool">WypeBnij</button>
			<button id="undoBtn">Cofnij</button>
			<button id="redoBtn">Ponów</button>
			<input type="file" id="importImage" accept="image/*" title="Importuj obraz">
			<select id="fontSize" title="Rozmiar czcionki">
                <option value="16">16px</option>
                <option value="24">24px</option>
                <option value="32" selected>32px</option>
                <option value="48">48px</option>
            </select>
		</div>
		<div id="proActivation">
			<input type="text" id="proCode" placeholder="Wpisz kod Pro">
			<button id="activatePro">Aktywuj Pro</button>
		</div>
	</div>
	<canvas id="canvas" width="1200" height="800"></canvas>
	<div id="settingsPanel" class="hidden">
		<div class="settings-header">
			<h3>Ustawienia</h3>
			<button id="closeSettings" class="close-btn"></button>
		</div>
		<div class="settings-content">
			<label>Rozmiar pBótna:</label>
			<input type="number" id="canvasWidth" value="1200" min="100" max="1920">
			<input type="number" id="canvasHeight" value="800" min="100" max="1080">
			<label>Kolor tBa:</label>
			<input type="color" id="bgColor" value="#ffffff">
			<label>Styl pdzla:</label>
			<select id="brushStyle">
                <option value="round">OkrgBy</option>
                <option value="square">Kwadratowy</option>
                <option value="butt">PBaski</option>
            </select>
			<label>Jzyk:</label>
			<select id="language">
                <option value="pl" selected>Polski</option>
                <option value="en">English</option>
                <option value="de">Deutsch</option>
            </select>
			<label>Motyw:</label>
			<select id="theme">
                <option value="light" selected>Jasny</option>
                <option value="dark">Ciemny</option>
            </select>
			<label>CzuBo[ myszy:</label>
			<input type="range" id="mouseSensitivity" min="1" max="10" value="5">
			<label>Siatka:</label>
			<input type="checkbox" id="gridToggle">
			<input type="number" id="gridSize" value="20" min="10" max="100" disabled>
			<button id="applySettings">Zastosuj</button>
			<button id="saveSettings">Zapisz ustawienia</button>
		</div>
	</div>

	<script src="script.js"></script>
</body>

</html><script type="text/javascript">const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const colorPicker = document.getElementById('colorPicker');
const fillColorPicker = document.getElementById('fillColorPicker');
const lineWidth = document.getElementById('lineWidth');
const clearBtn = document.getElementById('clearBtn');
const saveBtn = document.getElementById('saveBtn');
const proCode = document.getElementById('proCode');
const activatePro = document.getElementById('activatePro');
const settingsBtn = document.getElementById('settingsBtn');
const settingsPanel = document.getElementById('settingsPanel');
const canvasWidth = document.getElementById('canvasWidth');
const canvasHeight = document.getElementById('canvasHeight');
const bgColor = document.getElementById('bgColor');
const brushStyle = document.getElementById('brushStyle');
const language = document.getElementById('language');
const theme = document.getElementById('theme');
const mouseSensitivity = document.getElementById('mouseSensitivity');
const gridToggle = document.getElementById('gridToggle');
const gridSize = document.getElementById('gridSize');
const applySettings = document.getElementById('applySettings');
const saveSettings = document.getElementById('saveSettings');
const closeSettings = document.getElementById('closeSettings');
const tools = {
  brush: document.getElementById('brushBtn'),
  eraser: document.getElementById('eraserBtn'),
  line: document.getElementById('lineBtn'),
  rect: document.getElementById('rectBtn'),
  circle: document.getElementById('circleBtn'),
  text: document.getElementById('textBtn'),
  fill: document.getElementById('fillBtn')
};
const undoBtn = document.getElementById('undoBtn');
const redoBtn = document.getElementById('redoBtn');
const importImage = document.getElementById('importImage');
const fontSize = document.getElementById('fontSize');
const proTools = document.getElementById('proTools');

let painting = false;
let tool = 'brush';
let startX, startY;
let history = [];
let redoStack = [];
let isPro = false;
let currentLang = 'pl';
let sensitivity = 5;
let showGrid = false;
let gridSpacing = 20;

const translations = {
  pl: {
    brush: 'Pdzel', eraser: 'Gumka', line: 'Linia', rect: 'Prostokt', circle: 'KoBo',
    text: 'Tekst', fill: 'WypeBnij', clear: 'Wyczy[', save: 'Zapisz', settings: 'Ustawienia',
    undo: 'Cofnij', redo: 'Ponów', proCode: 'Wpisz kod Pro', activatePro: 'Aktywuj Pro',
    settingsTitle: 'Ustawienia', canvasSize: 'Rozmiar pBótna:', bgColor: 'Kolor tBa:',
    brushStyle: 'Styl pdzla:', language: 'Jzyk:', theme: 'Motyw:', mouseSensitivity: 'CzuBo[ myszy:',
    grid: 'Siatka:', apply: 'Zastosuj', close: 'Zamknij', saveSettings: 'Zapisz ustawienia',
    proActivated: 'Wersja Pro aktywowana! Odblokowano zaawansowane funkcje.',
    wrongCode: 'NieprawidBowy kod. Spróbuj ponownie.', proOnly: 'Funkcja dostpna w Pro.',
    textPrompt: 'Wpisz tekst:'
  },
  en: {
    brush: 'Brush', eraser: 'Eraser', line: 'Line', rect: 'Rectangle', circle: 'Circle',
    text: 'Text', fill: 'Fill', clear: 'Clear', save: 'Save', settings: 'Settings',
    undo: 'Undo', redo: 'Redo', proCode: 'Enter Pro code', activatePro: 'Activate Pro',
    settingsTitle: 'Settings', canvasSize: 'Canvas size:', bgColor: 'Background color:',
    brushStyle: 'Brush style:', language: 'Language:', theme: 'Theme:', mouseSensitivity: 'Mouse sensitivity:',
    grid: 'Grid:', apply: 'Apply', close: 'Close', saveSettings: 'Save settings',
    proActivated: 'Pro version activated! Advanced features unlocked.',
    wrongCode: 'Invalid code. Try again.', proOnly: 'Feature available in Pro.',
    textPrompt: 'Enter text:'
  },
  de: {
    brush: 'Pinsel', eraser: 'Radierer', line: 'Linie', rect: 'Rechteck', circle: 'Kreis',
    text: 'Text', fill: 'Füllen', clear: 'Löschen', save: 'Speichern', settings: 'Einstellungen',
    undo: 'Rückgängig', redo: 'Wiederholen', proCode: 'Pro-Code eingeben', activatePro: 'Pro aktivieren',
    settingsTitle: 'Einstellungen', canvasSize: 'Leinwandgröße:', bgColor: 'Hintergrundfarbe:',
    brushStyle: 'Pinselstil:', language: 'Sprache:', theme: 'Thema:', mouseSensitivity: 'Mausempfindlichkeit:',
    grid: 'Raster:', apply: 'Anwenden', close: 'Schließen', saveSettings: 'Einstellungen speichern',
    proActivated: 'Pro-Version aktiviert! Erweiterte Funktionen freigeschaltet.',
    wrongCode: 'Ungültiger Code. Versuche es erneut.', proOnly: 'Funktion nur in Pro verfügbar.',
    textPrompt: 'Text eingeben:'
  }
};

ctx.lineCap = 'round';
ctx.lineJoin = 'round';

// Aktualizacja interfejsu
function updateLanguage() {
  const t = translations[currentLang];
  tools.brush.textContent = t.brush;
  tools.eraser.textContent = t.eraser;
  tools.line.textContent = t.line;
  tools.rect.textContent = t.rect;
  tools.circle.textContent = t.circle;
  tools.text.textContent = t.text;
  tools.fill.textContent = t.fill;
  clearBtn.textContent = t.clear;
  saveBtn.textContent = t.save;
  settingsBtn.textContent = t.settings;
  undoBtn.textContent = t.undo;
  redoBtn.textContent = t.redo;
  proCode.placeholder = t.proCode;
  activatePro.textContent = t.activatePro;
  settingsPanel.querySelector('h3').textContent = t.settingsTitle;
  settingsPanel.querySelectorAll('label')[0].textContent = t.canvasSize;
  settingsPanel.querySelectorAll('label')[1].textContent = t.bgColor;
  settingsPanel.querySelectorAll('label')[2].textContent = t.brushStyle;
  settingsPanel.querySelectorAll('label')[3].textContent = t.language;
  settingsPanel.querySelectorAll('label')[4].textContent = t.theme;
  settingsPanel.querySelectorAll('label')[5].textContent = t.mouseSensitivity;
  settingsPanel.querySelectorAll('label')[6].textContent = t.grid;
  applySettings.textContent = t.apply;
  saveSettings.textContent = t.saveSettings;
  closeSettings.title = t.close;

  brushStyle.options[0].text = t.brushStyle === 'Styl pdzla:' ? 'OkrgBy' : t.brushStyle === 'Brush style:' ? 'Round' : 'Rund';
  brushStyle.options[1].text = t.brushStyle === 'Styl pdzla:' ? 'Kwadratowy' : t.brushStyle === 'Brush style:' ? 'Square' : 'Quadratisch';
  brushStyle.options[2].text = t.brushStyle === 'Styl pdzla:' ? 'PBaski' : t.brushStyle === 'Brush style:' ? 'Flat' : 'Flach';
}

// Aktywacja wersji Pro
activatePro.addEventListener('click', () => {
  if (proCode.value === '2137') {
    isPro = true;
    proTools.classList.remove('hidden');
    proTools.classList.add('active');
    fillColorPicker.disabled = false;
    alert(translations[currentLang].proActivated);
  } else {
    alert(translations[currentLang].wrongCode);
  }
});

// Wybór narzdzia
Object.keys(tools).forEach(t => {
  tools[t].addEventListener('click', () => {
    if (t === 'text' || t === 'fill') {
      if (!isPro) {
        alert(translations[currentLang].proOnly);
        return;
      }
    }
    tool = t;
    Object.values(tools).forEach(btn => btn.classList.remove('active'));
    tools[t].classList.add('active');
  });
});

// Zapis do historii
function saveState() {
  history.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
  redoStack = [];
  if (history.length > 50) history.shift();
}

// Rysowanie siatki
function drawGrid() {
  if (!showGrid) return;
  ctx.strokeStyle = '#ccc';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= canvas.width; x += gridSpacing) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, canvas.height);
    ctx.stroke();
  }
  for (let y = 0; y <= canvas.height; y += gridSpacing) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
    ctx.stroke();
  }
}

// Rozpoczcie rysowania
function startPainting(e) {
  painting = true;
  startX = e.clientX - canvas.offsetLeft;
  startY = e.clientY - canvas.offsetTop;
  saveState();
  ctx.beginPath();
  ctx.moveTo(startX, startY);
  if (tool === 'brush' || tool === 'eraser') draw(e);
  if (tool === 'text' && isPro) promptText(e);
}

// ZakoDczenie rysowania
function stopPainting(e) {
  if (!painting) return;
  painting = false;
  const endX = e.clientX - canvas.offsetLeft;
  const endY = e.clientY - canvas.offsetTop;

  ctx.strokeStyle = tool === 'eraser' ? '#fff' : colorPicker.value;
  ctx.lineWidth = lineWidth.value;
  if (isPro) ctx.fillStyle = fillColorPicker.value;

  if (tool === 'line') {
    ctx.beginPath();
    ctx.moveTo(startX, startY);
    ctx.lineTo(endX, endY);
    ctx.stroke();
  } else if (tool === 'rect') {
    if (isPro && tools.fill.classList.contains('active')) {
      ctx.fillRect(startX, startY, endX - startX, endY - startY);
    }
    ctx.strokeRect(startX, startY, endX - startX, endY - startY);
  } else if (tool === 'circle') {
    const radius = Math.sqrt(Math.pow(endX - startX, 2) + Math.pow(endY - startY, 2));
    ctx.beginPath();
    ctx.arc(startX, startY, radius, 0, Math.PI * 2);
    if (isPro && tools.fill.classList.contains('active')) ctx.fill();
    ctx.stroke();
  }
  ctx.beginPath();
  drawGrid();
}

// Rysowanie w czasie rzeczywistym
function draw(e) {
  if (!painting || (tool !== 'brush' && tool !== 'eraser')) return;

  ctx.lineWidth = lineWidth.value;
  ctx.strokeStyle = tool === 'eraser' ? '#fff' : colorPicker.value;

  const x = e.clientX - canvas.offsetLeft;
  const y = e.clientY - canvas.offsetTop;
  const dx = (x - startX) / sensitivity;
  const dy = (y - startY) / sensitivity;

  ctx.lineTo(startX + dx, startY + dy);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(startX + dx, startY + dy);
  startX += dx;
  startY += dy;
}

// Podgld ksztaBtów
function previewShape(e) {
  if (!painting || (tool !== 'line' && tool !== 'rect' && tool !== 'circle')) return;

  const endX = e.clientX - canvas.offsetLeft;
  const endY = e.clientY - canvas.offsetTop;

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.putImageData(history[history.length - 1], 0, 0);

  ctx.strokeStyle = colorPicker.value;
  ctx.lineWidth = lineWidth.value;
  if (isPro) ctx.fillStyle = fillColorPicker.value;

  if (tool === 'line') {
    ctx.beginPath();
    ctx.moveTo(startX, startY);
    ctx.lineTo(endX, endY);
    ctx.stroke();
  } else if (tool === 'rect') {
    if (isPro && tools.fill.classList.contains('active')) {
      ctx.fillRect(startX, startY, endX - startX, endY - startY);
    }
    ctx.strokeRect(startX, startY, endX - startX, endY - startY);
  } else if (tool === 'circle') {
    const radius = Math.sqrt(Math.pow(endX - startX, 2) + Math.pow(endY - startY, 2));
    ctx.beginPath();
    ctx.arc(startX, startY, radius, 0, Math.PI * 2);
    if (isPro && tools.fill.classList.contains('active')) ctx.fill();
    ctx.stroke();
  }
  drawGrid();
}

// Dodawanie tekstu (Pro)
function promptText(e) {
  const text = prompt(translations[currentLang].textPrompt);
  if (text) {
    ctx.font = `${fontSize.value}px Segoe UI`;
    ctx.fillStyle = colorPicker.value;
    ctx.fillText(text, startX, startY);
  }
  painting = false;
  drawGrid();
}

// WypeBnianie kolorem (Pro)
canvas.addEventListener('click', (e) => {
  if (tool === 'fill' && isPro) {
    saveState();
    const x = e.clientX - canvas.offsetLeft;
    const y = e.clientY - canvas.offsetTop;
    floodFill(x, y, hexToRgb(fillColorPicker.value));
    drawGrid();
  }
});

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return [r, g, b, 255];
}

function floodFill(x, y, fillColor) {
  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const targetColor = getPixelColor(imageData, x, y);
  if (colorsMatch(targetColor, fillColor)) return;

  const stack = [[x, y]];
  while (stack.length) {
    const [cx, cy] = stack.pop();
    const currentColor = getPixelColor(imageData, cx, cy);

    if (colorsMatch(currentColor, targetColor)) {
      setPixelColor(imageData, cx, cy, fillColor);
      stack.push([cx + 1, cy]);
      stack.push([cx - 1, cy]);
      stack.push([cx, cy + 1]);
      stack.push([cx, cy - 1]);
    }
  }
  ctx.putImageData(imageData, 0, 0);
}

function getPixelColor(imageData, x, y) {
  const index = (y * imageData.width + x) * 4;
  return [
    imageData.data[index],
    imageData.data[index + 1],
    imageData.data[index + 2],
    imageData.data[index + 3]
  ];
}

function setPixelColor(imageData, x, y, color) {
  const index = (y * imageData.width + x) * 4;
  imageData.data[index] = color[0];
  imageData.data[index + 1] = color[1];
  imageData.data[index + 2] = color[2];
  imageData.data[index + 3] = color[3];
}

function colorsMatch(c1, c2) {
  return c1[0] === c2[0] && c1[1] === c2[1] && c1[2] === c2[2] && c1[3] === c2[3];
}

// Event Listeners dla canvas
canvas.addEventListener('mousedown', startPainting);
canvas.addEventListener('mouseup', stopPainting);
canvas.addEventListener('mousemove', (e) => {
  draw(e);
  previewShape(e);
});
canvas.addEventListener('mouseout', stopPainting);

// Wyczy[ canvas
clearBtn.addEventListener('click', () => {
  saveState();
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawGrid();
});

// Zapisz obraz
saveBtn.addEventListener('click', () => {
  const link = document.createElement('a');
  link.download = 'obraz_pro.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
});

// Cofnij/Ponów (Pro)
undoBtn.addEventListener('click', () => {
  if (!isPro) return alert(translations[currentLang].proOnly);
  if (history.length > 1) {
    redoStack.push(history.pop());
    ctx.putImageData(history[history.length - 1], 0, 0);
    drawGrid();
  }
});

redoBtn.addEventListener('click', () => {
  if (!isPro) return alert(translations[currentLang].proOnly);
  if (redoStack.length) {
    history.push(redoStack.pop());
    ctx.putImageData(history[history.length - 1], 0, 0);
    drawGrid();
  }
});

// Import obrazu (Pro)
importImage.addEventListener('change', (e) => {
  if (!isPro) return alert(translations[currentLang].proOnly);
  const file = e.target.files[0];
  const img = new Image();
  img.onload = () => {
    saveState();
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    drawGrid();
  };
  img.src = URL.createObjectURL(file);
});

// Ustawienia
settingsBtn.addEventListener('click', () => {
  settingsPanel.classList.remove('hidden');
});

gridToggle.addEventListener('change', () => {
  gridSize.disabled = !gridToggle.checked;
});

applySettings.addEventListener('click', () => {
  const newWidth = parseInt(canvasWidth.value);
  const newHeight = parseInt(canvasHeight.value);
  canvas.width = newWidth;
  canvas.height = newHeight;
  ctx.fillStyle = bgColor.value;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.lineCap = brushStyle.value;
  ctx.lineJoin = brushStyle.value === 'round' ? 'round' : 'miter';
  currentLang = language.value;
  document.body.className = theme.value;
  sensitivity = parseInt(mouseSensitivity.value);
  showGrid = gridToggle.checked;
  gridSpacing = parseInt(gridSize.value);
  updateLanguage();
  saveState();
  drawGrid();
  settingsPanel.classList.add('hidden');
});

saveSettings.addEventListener('click', () => {
  const settings = {
    width: canvasWidth.value,
    height: canvasHeight.value,
    bgColor: bgColor.value,
    brushStyle: brushStyle.value,
    language: language.value,
    theme: theme.value,
    sensitivity: mouseSensitivity.value,
    grid: gridToggle.checked,
    gridSize: gridSize.value
  };
  localStorage.setItem('paintProSettings', JSON.stringify(settings));
  alert(translations[currentLang].saveSettings + ' - OK');
});

closeSettings.addEventListener('click', () => {
  settingsPanel.classList.add('hidden');
});

// Aadowanie zapisanych ustawieD
function loadSettings() {
  const saved = localStorage.getItem('paintProSettings');
  if (saved) {
    const settings = JSON.parse(saved);
    canvasWidth.value = settings.width;
    canvasHeight.value = settings.height;
    bgColor.value = settings.bgColor;
    brushStyle.value = settings.brushStyle;
    language.value = settings.language;
    theme.value = settings.theme;
    mouseSensitivity.value = settings.sensitivity;
    gridToggle.checked = settings.grid;
    gridSize.value = settings.gridSize;
    gridSize.disabled = !settings.grid;
    applySettings.click();
  }
}

// Inicjalizacja
updateLanguage();
loadSettings();</script></body><html>
