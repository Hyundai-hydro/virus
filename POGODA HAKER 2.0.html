<!doctype html><html><head><style type="text/css">* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Roboto', sans-serif;
    min-height: 100vh;
    background: linear-gradient(45deg, #2c3e50, #3498db);
    color: white;
    overflow-x: hidden;
    transition: background 1s ease;
    position: relative;
}

.sidebar {
    position: fixed;
    top: 0;
    left: -350px;
    width: 350px;
    height: 100%;
    background: rgba(44, 62, 80, 0.95);
    padding: 20px;
    transition: left 0.3s ease;
    z-index: 20;
    overflow-y: auto;
    box-shadow: 2px 0 10px rgba(0, 0, 0, 0.5);
}

.sidebar.active {
    left: 0;
}

.hacker-menu {
    position: fixed;
    top: 0;
    right: -350px;
    width: 350px;
    height: 100%;
    background: rgba(0, 255, 0, 0.2);
    padding: 20px;
    transition: right 0.3s ease;
    z-index: 20;
    overflow-y: auto;
    box-shadow: -2px 0 10px rgba(0, 0, 0, 0.5);
    font-family: 'Courier New', monospace;
    color: #0f0;
}

.hacker-menu.active {
    right: 0;
}

.menu-btn, .hacker-btn {
    position: fixed;
    top: 15px;
    background: #3498db;
    border: none;
    color: white;
    padding: 8px 12px;
    border-radius: 5px;
    cursor: pointer;
    z-index: 21;
    font-size: 16px;
    transition: background 0.2s, transform 0.2s;
}

.menu-btn {
    left: 15px;
}

.hacker-btn {
    right: 15px;
    background: #0f0;
    color: #000;
}

.menu-btn:hover, .hacker-btn:hover {
    background: #2980b9;
    transform: scale(1.1);
}

.hacker-btn:hover {
    background: #0c0;
}

h1 {
    font-size: 26px;
    margin-bottom: 20px;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 2px;
}

.tabs {
    display: flex;
    flex-wrap: wrap;
    background: rgba(255, 255, 255, 0.1);
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 15px;
}

.tab {
    flex: 1;
    text-align: center;
    padding: 10px;
    cursor: pointer;
    transition: background 0.3s, color 0.3s;
    border-radius: 5px;
    margin: 5px;
    font-size: 14px;
}

.tab:hover, .tab.active {
    background: #3498db;
    color: white;
}

.hacker-menu .tab:hover, .hacker-menu .tab.active {
    background: #0f0;
    color: #000;
}

.controls {
    display: none;
    grid-template-columns: 1fr;
    gap: 12px;
}

.controls.active {
    display: grid;
}

button {
    padding: 12px;
    background: linear-gradient(45deg, #3498db, #2980b9);
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 14px;
    transition: transform 0.2s, box-shadow 0.2s;
    text-align: left;
}

.hacker-menu button {
    background: linear-gradient(45deg, #0f0, #0c0);
    color: #000;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
}

label {
    font-size: 13px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 0;
    position: relative;
}

.hacker-menu label {
    color: #0f0;
}

label:hover::after {
    content: attr(data-tooltip);
    position: absolute;
    top: -35px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(44, 62, 80, 0.9);
    color: white;
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 11px;
    white-space: nowrap;
    z-index: 10;
}

.hacker-menu label:hover::after {
    background: rgba(0, 255, 0, 0.5);
    color: #000;
}

input[type="range"] {
    width: 100%;
    height: 6px;
    background: rgba(255, 255, 255, 0.2);
    border-radius: 3px;
    outline: none;
    appearance: none;
}

.hacker-menu input[type="range"] {
    background: rgba(0, 255, 0, 0.3);
}

input[type="range"]::-webkit-slider-thumb {
    appearance: none;
    width: 16px;
    height: 16px;
    background: #3498db;
    border-radius: 50%;
    cursor: pointer;
    transition: background 0.2s;
}

.hacker-menu input[type="range"]::-webkit-slider-thumb {
    background: #0f0;
}

input[type="range"]::-webkit-slider-thumb:hover {
    background: #2980b9;
}

.hacker-menu input[type="range"]::-webkit-slider-thumb:hover {
    background: #0c0;
}

input[type="range"][id="temperature"]::-webkit-slider-thumb {
    background: linear-gradient(45deg, #e74c3c, #3498db);
}

input[type="checkbox"] {
    width: 16px;
    height: 16px;
    accent-color: #3498db;
}

.hacker-menu input[type="checkbox"] {
    accent-color: #0f0;
}

.canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: auto;
    z-index: 5;
}

.particle {
    position: absolute;
    pointer-events: none;
}

.rain { background: #00f; width: 2px; height: 10px; }
.snow { background: white; width: 5px; height: 5px; border-radius: 50%; }
.hail { background: #aaa; width: 8px; height: 8px; border-radius: 50%; }
.cloud { background: rgba(255, 255, 255, 0.5); width: 100px; height: 50px; border-radius: 50%; }
.tornado { background: rgba(100, 100, 100, 0.5); width: 20px; height: 100px; transform-origin: bottom; }
.lightning {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: white;
    opacity: 0;
    transition: opacity 0.1s;
}

.rainbow {
    position: fixed;
    top: 20%;
    left: 0;
    width: 100%;
    height: 20px;
    background: linear-gradient(to right, red, orange, yellow, green, blue, indigo, violet);
    opacity: 0;
    z-index: 4;
    filter: blur(2px);
}

.alert {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(231, 76, 60, 0.9);
    color: white;
    padding: 12px 24px;
    border-radius: 8px;
    z-index: 20;
    display: none;
    animation: fadeInOut 3s;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
}

@keyframes fadeInOut {
    0% { opacity: 0; transform: translate(-50%, -20px); }
    10% { opacity: 1; transform: translate(-50%, 0); }
    90% { opacity: 1; transform: translate(-50%, 0); }
    100% { opacity: 0; transform: translate(-50%, -20px); }
}

.slonecznie { background: linear-gradient(to bottom, #87ceeb, #f4d03f); }
.deszcz { background: linear-gradient(to bottom, #4682b4, #2f4f4f); }
.snieg { background: linear-gradient(to bottom, #b0c4de, #ffffff); }
.burza { background: linear-gradient(to bottom, #191970, #2f4f4f); }
.pochmurno { background: linear-gradient(to bottom, #778899, #708090); }
.wietrznie { background: linear-gradient(to bottom, #add8e6, #b0e0e6); }
.grad { background: linear-gradient(to bottom, #a9a9a9, #696969); }
.tornado { background: linear-gradient(to bottom, #708090, #2f4f4f); }
.upal { background: linear-gradient(to bottom, #ff4500, #ffa500); }
.mroz { background: linear-gradient(to bottom, #e6e6fa, #f0f8ff); }
.piasek { background: linear-gradient(to bottom, #f4a460, #d2b48c); }
.smuga { background: linear-gradient(to bottom, #87ceeb, #ffffff); }
.zorza { background: linear-gradient(to bottom, #191970, #483d8b); }
.lawa { background: linear-gradient(to bottom, #ff4500, #8b0000); }
.ufo { background: linear-gradient(to bottom, #000, #0f0); }
.glitch { background: linear-gradient(to bottom, #f0f, #0ff); }
.matrix { background: linear-gradient(to bottom, #000, #0f0); }

@media (max-width: 600px) {
    .sidebar, .hacker-menu {
        width: 100%;
        left: -100%;
    }

    .sidebar.active {
        left: 0;
    }

    .hacker-menu {
        right: -100%;
    }

    .hacker-menu.active {
        right: 0;
    }

    .menu-btn, .hacker-btn {
        padding: 6px 10px;
        font-size: 14px;
    }

    button, label {
        font-size: 12px;
    }

    .tabs {
        flex-direction: column;
    }

    .tab {
        margin: 2px 0;
    }
}</style></head><body><!DOCTYPE html>
<html lang="pl">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Pogoda Hack</title>
	<link rel="stylesheet" href="styles.css">
</head>

<body class="slonecznie">
	<button class="menu-btn">Menu</button>
	<button class="hacker-btn">Hacker</button>
	<div class="sidebar">
		<h1>Pogoda Hack</h1>
		<div class="tabs">
			<div class="tab active" data-tab="weather">Pogoda</div>
			<div class="tab" data-tab="effects">Efekty</div>
			<div class="tab" data-tab="colors">Kolory</div>
			<div class="tab" data-tab="sound">Dzwiek</div>
		</div>
		<div class="controls active" id="weather">
			<button onclick="setWeather('slonecznie')">Slonecznie</button>
			<button onclick="setWeather('deszcz')">Deszcz</button>
			<button onclick="setWeather('snieg')">Snieg</button>
			<button onclick="setWeather('burza')">Burza</button>
			<button onclick="setWeather('pochmurno')">Pochmurno</button>
			<button onclick="setWeather('wietrznie')">Wietrznie</button>
			<button onclick="setWeather('grad')">Grad</button>
			<button onclick="setWeather('tornado')">Tornado</button>
			<button onclick="setWeather('upal')">Upal</button>
			<button onclick="setWeather('mroz')">Mroz</button>
			<button onclick="setWeather('piasek')">Burza Piaskowa</button>
			<button onclick="setWeather('smuga')">Smuga Kondensacyjna</button>
			<button onclick="setWeather('zorza')">Zorza Polarna</button>
			<button onclick="randomWeather()">Ustaw Pogode (czasami sie nie ustawia)</button>
			<button onclick="resetSettings()">Reset</button>
		</div>
		<div class="controls" id="effects">
			<label data-tooltip="Reguluje sile opadow">Intensywnosc opadow: <span id="intensity-value">50</span>%</label>
			<input type="range" id="intensity" min="0" max="1000" value="50" oninput="updateIntensity()">
			<label data-tooltip="Kierunek i predkosc wiatru">Sila wiatru: <span id="wind-value">0</span> m/s</label>
			<input type="range" id="wind" min="-1000" max="1000" value="0" oninput="updateWind()">
			<label data-tooltip="Temperatura otoczenia">Temperatura: <span id="temp-value">20</span> C</label>
			<input type="range" id="temperature" min="-1000" max="1000" value="20" oninput="updateTemperature()">
			<label data-tooltip="Poziom wilgoci w powietrzu">Wilgotnosc: <span id="humidity-value">50</span>%</label>
			<input type="range" id="humidity" min="0" max="1000" value="50" oninput="updateHumidity()">
			<label data-tooltip="Cisnienie atmosferyczne">Cisnienie: <span id="pressure-value">1013</span> hPa</label>
			<input type="range" id="pressure" min="0" max="10000" value="1013" oninput="updatePressure()">
			<label data-tooltip="Gestosc chmur na niebie">Zachmurzenie: <span id="cloudiness-value">0</span>%</label>
			<input type="range" id="cloudiness" min="0" max="1000" value="0" oninput="updateCloudiness()">
			<label data-tooltip="Poziom mgly">Mgla: <span id="fog-value">0</span>%</label>
			<input type="range" id="fog" min="0" max="1000" value="0" oninput="updateFog()">
			<label data-tooltip="Wlacz/wylacz tecze">Tecza: <input type="checkbox" id="rainbow" onchange="toggleRainbow()"></label>
			<label data-tooltip="Jasnosc teczy">Intensywnosc teczy: <span id="rainbow-intensity-value">50</span>%</label>
			<input type="range" id="rainbow-intensity" min="0" max="1000" value="50" oninput="updateRainbowIntensity()">
			<label data-tooltip="Czestosc blyskawic">Czestosc blyskawic: <span id="lightning-freq-value">10</span>%</label>
			<input type="range" id="lightning-freq" min="0" max="1000" value="10" oninput="updateLightningFreq()">
			<label data-tooltip="Godzina dnia">Pora dnia: <span id="time-value">12</span>h</label>
			<input type="range" id="time" min="0" max="24" value="12" oninput="updateTime()">
			<label data-tooltip="Predkosc ruchu chmur">Predkosc chmur: <span id="cloud-speed-value">10</span> px/s</label>
			<input type="range" id="cloud-speed" min="0" max="1000" value="10" oninput="updateCloudSpeed()">
			<label data-tooltip="Glebokosc warstwy sniegu">Glebokosc sniegu: <span id="snow-depth-value">0</span> cm</label>
			<input type="range" id="snow-depth" min="0" max="1000" value="0" oninput="updateSnowDepth()">
			<label data-tooltip="Rozmiar kulek gradu">Rozmiar gradu: <span id="hail-size-value">0</span> cm</label>
			<input type="range" id="hail-size" min="0" max="100" value="0" oninput="updateHailSize()">
			<label data-tooltip="Sila wiru tornada">Sila tornada: <span id="tornado-strength-value">0</span>%</label>
			<input type="range" id="tornado-strength" min="0" max="1000" value="0" oninput="updateTornadoStrength()">
			<label data-tooltip="Ilosc piasku w burzy">Poziom piasku: <span id="sand-level-value">0</span>%</label>
			<input type="range" id="sand-level" min="0" max="1000" value="0" oninput="updateSandLevel()">
			<label data-tooltip="Jasnosc zorzy polarnej">Jasnosc zorzy: <span id="aurora-value">0</span>%</label>
			<input type="range" id="aurora" min="0" max="1000" value="0" oninput="updateAurora()">
			<label data-tooltip="Liczba smug samolotow">Smugi kondensacyjne: <span id="contrail-value">0</span></label>
			<input type="range" id="contrail" min="0" max="100" value="0" oninput="updateContrail()">
			<label data-tooltip="Czestosc spadania meteorytow">Deszcz meteorytow: <span id="meteor-value">0</span>/s</label>
			<input type="range" id="meteor" min="0" max="500" value="0" oninput="updateMeteor()">
			<label data-tooltip="Poziom smogu w powietrzu">Poziom smogu: <span id="smog-value">0</span>%</label>
			<input type="range" id="smog" min="0" max="1000" value="0" oninput="updateSmog()">
			<label data-tooltip="Widocznosc gwiazd w nocy">Widocznosc gwiazd: <span id="stars-value">0</span>%</label>
			<input type="range" id="stars" min="0" max="1000" value="0" oninput="updateStars()">
			<label data-tooltip="Poziom rosy na powierzchni">Poziom rosy: <span id="dew-value">0</span>%</label>
			<input type="range" id="dew" min="0" max="1000" value="0" oninput="updateDew()">
			<label data-tooltip="Wysokosc fal morskich">Sila fal: <span id="wave-value">0</span> m</label>
			<input type="range" id="wave" min="0" max="100" value="0" oninput="updateWave()">
			<label data-tooltip="Czas trwania blyskawicy">Predkosc blyskawic: <span id="lightning-speed-value">100</span> ms</label>
			<input type="range" id="lightning-speed" min="10" max="5000" value="100" oninput="updateLightningSpeed()">
			<label data-tooltip="Poziom szronu na krawedziach">Poziom szronu: <span id="frost-value">0</span>%</label>
			<input type="range" id="frost" min="0" max="1000" value="0" oninput="updateFrost()">
			<label data-tooltip="Sila drgan ekranu">Sila trzesienia ziemi: <span id="earthquake-value">0</span></label>
			<input type="range" id="earthquake" min="0" max="100" value="0" oninput="updateEarthquake()">
			<label data-tooltip="Poziom szadzi na powierzchni">Poziom szadzi: <span id="rime-value">0</span>%</label>
			<input type="range" id="rime" min="0" max="1000" value="0" oninput="updateRime()">
			<label data-tooltip="Poziom oblodzenia ekranu">Poziom oblodzenia: <span id="ice-value">0</span>%</label>
			<input type="range" id="ice" min="0" max="1000" value="0" oninput="updateIce()">
			<label data-tooltip="Miesiac wplywajacy na pogode">Miesiac: <span id="month-value">1</span></label>
			<input type="range" id="month" min="1" max="12" value="1" oninput="updateMonth()">
			<label data-tooltip="Rodzaj chmur na niebie">Typ chmur: <span id="cloud-type-value">Brak</span></label>
			<input type="range" id="cloud-type" min="0" max="10" value="0" oninput="updateCloudType()">
			<label data-tooltip="Efekt wizualny ekranu">Filtr: <span id="filter-value">Brak</span></label>
			<input type="range" id="filter" min="0" max="5" value="0" oninput="updateFilter()">
			<button onclick="triggerLightning()">Reczna blyskawica</button>
			<button onclick="triggerMeteorShower()">Deszcz meteorytow</button>
			<button onclick="triggerVolcano()">Erupcja wulkanu</button>
			<button onclick="triggerFlood()">Powodz</button>
		</div>
		<div class="controls" id="colors">
			<label data-tooltip="Czerwony skladnik nieba">Kolor nieba R: <span id="sky-r-value">135</span></label>
			<input type="range" id="sky-r" min="0" max="255" value="135" oninput="updateSkyColor()">
			<label data-tooltip="Zielony skladnik nieba">Kolor nieba G: <span id="sky-g-value">206</span></label>
			<input type="range" id="sky-g" min="0" max="255" value="206" oninput="updateSkyColor()">
			<label data-tooltip="Niebieski skladnik nieba">Kolor nieba B: <span id="sky-b-value">235</span></label>
			<input type="range" id="sky-b" min="0" max="255" value="235" oninput="updateSkyColor()">
			<label data-tooltip="Czerwony skladnik opadow">Kolor opadow R: <span id="precip-r-value">0</span></label>
			<input type="range" id="precip-r" min="0" max="255" value="0" oninput="updatePrecipColor()">
			<label data-tooltip="Zielony skladnik opadow">Kolor opadow G: <span id="precip-g-value">0</span></label>
			<input type="range" id="precip-g" min="0" max="255" value="0" oninput="updatePrecipColor()">
			<label data-tooltip="Niebieski skladnik opadow">Kolor opadow B: <span id="precip-b-value">255</span></label>
			<input type="range" id="precip-b" min="0" max="255" value="255" oninput="updatePrecipColor()">
        </div>
			<div class="controls" id="sound">
				<label data-tooltip="Glosnosc wszystkich dzwiekow">Glosnosc: <span id="volume-value">50</span>%</label>
				<input type="range" id="volume" min="0" max="100" value="50" oninput="updateVolume()">
				<button onclick="tryPlaySound('rain')">Dzwiek deszczu</button>
				<button onclick="tryPlaySound('thunder')">Dzwiek grzmotu</button>
				<button onclick="tryPlaySound('wind')">Dzwiek wiatru</button>
				<button onclick="tryPlaySound('hail')">Dzwiek gradu</button>
				<button onclick="tryPlaySound('tornado')">Dzwiek tornada</button>
				<button onclick="tryPlaySound('sand')">Dzwiek piasku</button>
				<button onclick="tryPlaySound('wave')">Dzwiek fal</button>
				<button onclick="tryPlaySound('birds')">Dzwiek ptakow</button>
				<button onclick="tryPlaySound('wolves')">Dzwiek wilkow</button>
				<button onclick="tryPlaySound('aurora')">Dzwiek zorzy</button>
				<button onclick="tryPlaySound('meteor')">Dzwiek meteorytow</button>
				<button onclick="tryPlaySound('volcano')">Dzwiek wulkanu</button>
				<button onclick="tryPlaySound('frost')">Dzwiek szronu</button>
				<button onclick="tryPlaySound('flood')">Dzwiek powodzi</button>
				<button onclick="tryPlaySound('ufo')">Dzwiek UFO</button>
				<button onclick="tryPlaySound('glitch')">Dzwiek glitch</button>
				<button onclick="toggleAutoSound()">Autodzwiek: <span id="auto-sound-status">Wyl</span></button>
			</div>
		</div>
		<div class="hacker-menu">
			<h1>Hacker Mode</h1>
			<div class="tabs">
				<div class="tab active" data-tab="hacker-weather">Anomalie</div>
				<div class="tab" data-tab="hacker-effects">Szal Efekty</div>
			</div>
			<div class="controls active" id="hacker-weather">
				<button onclick="setWeather('lawa')">Deszcz Lawy</button>
				<button onclick="setWeather('ufo')">Inwazja UFO</button>
				<button onclick="setWeather('glitch')">Glitch Rzeczywistosci</button>
				<button onclick="setWeather('matrix')">Matrix</button>
				<button onclick="triggerBlackHole()">Czarna Dziura</button>
				<button onclick="triggerTimeWarp()">Zakrzywienie Czasu</button>
				<button onclick="triggerAlienSignal()">Sygnal Obcych</button>
			</div>
			<div class="controls" id="hacker-effects">
				<label data-tooltip="Grawitacja jak na innej planecie">Grawitacja: <span id="gravity-value">1</span> g</label>
				<input type="range" id="gravity" min="0" max="100" value="1" oninput="updateGravity()">
				<label data-tooltip="Gestosc atmosfery">Gestosc atmosfery: <span id="density-value">1</span> kg/m3</label>
				<input type="range" id="density" min="0" max="1000" value="1" oninput="updateDensity()">
				<label data-tooltip="Sila pola magnetycznego">Pole magnetyczne: <span id="magnetic-value">0</span> T</label>
				<input type="range" id="magnetic" min="0" max="1000" value="0" oninput="updateMagnetic()">
				<label data-tooltip="Poziom radiacji w powietrzu">Radiacja: <span id="radiation-value">0</span> Sv</label>
				<input type="range" id="radiation" min="0" max="1000" value="0" oninput="updateRadiation()">
				<label data-tooltip="Szybkosc obrotu ziemi">Obrot ziemi: <span id="rotation-value">1</span> h</label>
				<input type="range" id="rotation" min="0" max="100" value="1" oninput="updateRotation()">
				<label data-tooltip="Poziom chaosu w systemie">Entropia: <span id="entropy-value">0</span>%</label>

function createParticle() {
  if (particles.length >= 1000) return;
  if (entropy > 800 && Math.random() < entropy / 1000) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vx: (Math.random() - 0.5) * 20,
      vy: (Math.random() - 0.5) * 20,
      type: "chaos",
      size: Math.random() * 20
    });
  }
  if (weather === "deszcz" || weather === "burza") {
    particles.push({
      x: Math.random() * canvas.width,
      y: 0,
      vx: wind / 100 + (Math.random() - 0.5) * entropy / 100,
      vy: (5 + intensity / 100) * gravity,
      type: "rain",
      size: 2
    });
  } else if (weather === "snieg") {
    particles.push({
      x: Math.random() * canvas.width,
      y: 0,
      vx: wind / 200 + (Math.random() - 0.5) * entropy / 100,
      vy: (2 + intensity / 500) * gravity,
      type: "snow",
      size: 3
    });
  } else if (weather === "grad") {
    particles.push({
      x: Math.random() * canvas.width,
      y: 0,
      vx: wind / 150 + (Math.random() - 0.5) * entropy / 100,
      vy: (5 + intensity / 200) * gravity,
      type: "hail",
      size: hailSize || 8
    });
  } else if (weather === "tornado" && tornadoStrength > 0) {
    particles.push({
      x: canvas.width / 2 + Math.random() * 50 - 25,
      y: canvas.height,
      vx: (Math.random() - 0.5) * tornadoStrength / 100,
      vy: -tornadoStrength / 100,
      type: "tornado",
      size: tornadoStrength
    });
  } else if (weather === "piasek" && sandLevel > 0) {
    particles.push({
      x: Math.random() * canvas.width,
      y: canvas.height,
      vx: wind / 50 + (Math.random() - 0.5) * entropy / 100,
      vy: -sandLevel / 200,
      type: "sand",
      size: sandLevel / 100
    });
  } else if (weather === "smuga" && contrail > 0) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height / 4,
      vx: -contrail * 5,
      vy: 0,
      type: "contrail",
      size: contrail * 10
    });
  } else if (weather === "zorza" && aurora > 0) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height / 4,
      vx: 0,
      vy: 0,
      type: "aurora",
      size: aurora / 10
    });
  } else if (weather === "lawa") {
    particles.push({
      x: Math.random() * canvas.width,
      y: 0,
      vx: wind / 100 + (Math.random() - 0.5) * entropy / 100,
      vy: (5 + intensity / 100) * gravity,
      type: "lava",
      size: hailSize || 5
    });
  } else if (weather === "ufo" && alien > 0) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height / 4,
      vx: (Math.random() - 0.5) * alien / 100,
      vy: (Math.random() - 0.5) * alien / 100,
      type: "ufo",
      size: alien / 20
    });
  } else if (meteor > 0) {
    particles.push({
      x: Math.random() * canvas.width,
      y: 0,
      vx: (Math.random() - 0.5) * 20,
      vy: 20 * gravity,
      type: "meteor",
      size: 5
    });
  }
  if (cloudiness > 0) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height / 4,
      vx: wind / 500 + cloudSpeed / 100 + (Math.random() - 0.5) * entropy / 100,
      vy: 0,
      type: "cloud",
      size: 50 + cloudiness / 20
    });
  }
  if (stars > 0 && time > 18) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vx: 0,
      vy: 0,
      type: "star",
      size: stars / 200
    });
  }
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if ((weather === "deszcz" || weather === "burza" || weather === "snieg" || weather === "grad" || weather === "lawa" || weather === "ufo") && Math.random() < intensity / 1000) {
    createParticle();
  }
  if ((cloudiness > 0 && Math.random() < cloudiness / 5000) || meteor > 0 || sandLevel > 0 || contrail > 0 || aurora > 0 || stars > 0 || blackhole > 0 || alien > 0 || meme > 0 || disco > 0) {
    createParticle();
  }

  particles = particles.filter(particle => particle.y < canvas.height + (particle.size || 10) && particle.x < canvas.width + (particle.size || 10) && particle.x > -(particle.size || 10) && particle.y > -(particle.size || 10));
  particles.forEach(particle => {
    particle.x += particle.vx * timewarp;
    particle.y += particle.vy * timewarp;
    if (blackhole > 0 && particle.type !== "blackhole") {
      const dx = canvas.width / 2 - particle.x;
      const dy = canvas.height / 2 - particle.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > 10) {
        particle.vx += (dx / dist) * blackhole / 10;
        particle.vy += (dy / dist) * blackhole / 10;
      }
    }
    if (magnetic > 0 && particle.type !== "blackhole") {
      particle.vx += (Math.random() - 0.5) * magnetic / 100;
      particle.vy += (Math.random() - 0.5) * magnetic / 100;
    }
    ctx.beginPath();
    if (particle.type === "rain") {
      ctx.fillStyle = `rgb(${precipR}, ${precipG}, ${precipB})`;
      ctx.fillRect(particle.x, particle.y, 2, 10);
    } else if (particle.type === "snow") {
      ctx.fillStyle = `rgb(${precipR}, ${precipG}, ${precipB})`;
      ctx.arc(particle.x, particle.y, particle.size || 3, 0, Math.PI * 2);
      ctx.fill();
    } else if (particle.type === "hail") {
      ctx.fillStyle = `rgb(${precipR}, ${precipG}, ${precipB})`;
      ctx.arc(particle.x, particle.y, particle.size || 8, 0, Math.PI * 2);
      ctx.fill();
    } else if (particle.type === "cloud") {
      ctx.fillStyle = `rgba(255, 255, 255, ${cloudiness / 1000})`;
      ctx.ellipse(particle.x, particle.y, particle.size || 50, (particle.size || 50) / 2, 0, 0, Math.PI * 2);
      ctx.fill();
    } else if (particle.type === "tornado") {
      ctx.fillStyle = `rgba(100, 100, 100, ${tornadoStrength / 1000})`;
      ctx.fillRect(particle.x, particle.y, (particle.size || 50) / 5, particle.size || 50);
    } else if (particle.type === "sand") {
      ctx.fillStyle = `rgba(210, 180, 140, ${sandLevel / 1000})`;
      ctx.arc(particle.x, particle.y, particle.size || 5, 0, Math.PI * 2);
      ctx.fill();
    } else if (particle.type === "contrail") {
      ctx.fillStyle = `rgba(255, 255, 255, ${contrail / 100})`;
      ctx.fillRect(particle.x, particle.y, particle.size || 10, 2);
    } else if (particle.type === "aurora") {
      ctx.fillStyle = `rgba(0, 255, 0, ${aurora / 1000})`;
      ctx.arc(particle.x, particle.y, particle.size || 10, 0, Math.PI * 2);
      ctx.fill();
    } else if (particle.type === "meteor") {
      ctx.fillStyle = "#ff4500";
      ctx.arc(particle.x, particle.y, particle.size || 5, 0, Math.PI * 2);
      ctx.fill();
    } else if (particle.type === "star") {
      ctx.fillStyle = `rgba(255, 255, 255, ${stars / 1000})`;
      ctx.arc(particle.x, particle.y, particle.size || 2, 0, Math.PI * 2);
      ctx.fill();
    } else if (particle.type === "volcano") {
      ctx.fillStyle = "#ff4500";
      ctx.arc(particle.x, particle.y, particle.size || 100, 0, Math.PI * 2);
      ctx.fill();
    } else if (particle.type === "lava") {
      ctx.fillStyle = `rgb(255, ${Math.random() * 100}, 0)`;
      ctx.arc(particle.x, particle.y, particle.size || 5, 0, Math.PI * 2);
      ctx.fill();
    } else if (particle.type === "ufo") {
      ctx.fillStyle = `rgba(0, 255, 0, ${alien / 1000})`;
      ctx.moveTo(particle.x, particle.y - (particle.size || 10));
      ctx.lineTo(particle.x + (particle.size || 10), particle.y + (particle.size || 10));
      ctx.lineTo(particle.x - (particle.size || 10), particle.y + (particle.size || 10));
      ctx.closePath();
      ctx.fill();
    } else if (particle.type === "blackhole") {
      ctx.fillStyle = "rgba(0, 0, 0, 0.9)";
      ctx.arc(particle.x, particle.y, particle.size || 100, 0, Math.PI * 2);
      ctx.fill();
    } else if (particle.type === "chaos") {
      ctx.fillStyle = getRandomColor();
      ctx.arc(particle.x, particle.y, particle.size || 10, 0, Math.PI * 2);
      ctx.fill();
    } else if (particle.type === "meme") {
      ctx.fillStyle = getRandomColor();
      ctx.font = `${particle.size || 50}px Comic Sans MS`;
      ctx.fillText("LOL", particle.x, particle.y);
    } else if (particle.type === "matrix") {
      ctx.fillStyle = "#0f0";
      ctx.font = "20px Courier New";
      for (let i = 0; i < canvas.width / 20; i++) {
        ctx.fillText(String.fromCharCode(33 + Math.random() * 94), i * 20, particle.y + (Math.random() * canvas.height));
        particle.y += 10;
        if (particle.y > canvas.height) particle.y = 0;
      }
    }
  });

  if (wave > 0) {
    ctx.beginPath();
    ctx.fillStyle = `rgba(0, 105, 148, ${humidity / 1000})`;
    for (let x = 0; x < canvas.width; x += 10) {
      let y = canvas.height - 50 + Math.sin(x / 50 + Date.now() / (1000 / timewarp)) * wave * 10;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(canvas.width, canvas.height);
    ctx.lineTo(0, canvas.height);
    ctx.fill();
  }

  if (disco > 0) {
    ctx.fillStyle = `rgba(${Math.random() * 255}, ${Math.random() * 255}, ${Math.random() * 255}, ${disco / 1000})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  if (radiation > 800) {
    ctx.fillStyle = `rgba(0, 255, 0, ${Math.random() * 0.2})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  requestAnimationFrame(animate);
}

    });

    });

});
