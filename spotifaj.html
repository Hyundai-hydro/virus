<!doctype html><html><head><style type="text/css">* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}

body {
    background-color: #121212;
    color: #fff;
}

.container {
    display: flex;
    height: 100vh;
}

.sidebar {
    width: 240px;
    background-color: #000;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.logo {
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo svg {
    width: 40px;
    height: 40px;
}

.logo h2 {
    font-size: 24px;
}

.nav-menu ul, .playlists ul {
    list-style: none;
}

.nav-menu li, .playlists li {
    margin: 10px 0;
}

.nav-menu a, .playlists a {
    color: #b3b3b3;
    text-decoration: none;
    font-size: 16px;
    padding: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.nav-menu a:hover, .playlists a:hover, .nav-menu a.active {
    color: #fff;
    background-color: #282828;
    border-radius: 4px;
}

.playlists h3 {
    color: #fff;
    font-size: 14px;
    margin-bottom: 10px;
}

.upload button {
    background-color: #1db954;
    color: #fff;
    border: none;
    padding: 10px;
    border-radius: 20px;
    cursor: pointer;
    width: 100%;
    font-size: 14px;
}

.upload button:hover {
    background-color: #1ed760;
}

.main-content {
    flex: 1;
    background-color: #181818;
    padding: 20px;
    overflow-y: auto;
}

header h1 {
    font-size: 24px;
    margin-bottom: 20px;
}

.track-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.track {
    display: flex;
    align-items: center;
    padding: 10px;
    background-color: #282828;
    border-radius: 4px;
    cursor: pointer;
}

.track:hover {
    background-color: #333;
}

.track img {
    width: 50px;
    height: 50px;
    margin-right: 10px;
    border-radius: 4px;
}

.track-info h4 {
    font-size: 16px;
}

.track-info p {
    font-size: 14px;
    color: #b3b3b3;
}

.duration {
    margin-left: auto;
    color: #b3b3b3;
}

.player {
    height: 90px;
    background-color: #181818;
    border-top: 1px solid #282828;
    display: flex;
    align-items: center;
    padding: 0 20px;
    position: fixed;
    bottom: 0;
    width: 100%;
}

.player-track {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 30%;
}

.player-track img {
    width: 50px;
    height: 50px;
}

.player-controls {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 20px;
    justify-content: center;
}

.player-controls button {
    background: none;
    border: none;
    color: #fff;
    font-size: 24px;
    cursor: pointer;
}

.player-controls button:hover {
    color: #1db954;
}

#progress-bar {
    width: 300px;
    cursor: pointer;
}

#current-time, #duration {
    font-size: 12px;
    color: #b3b3b3;
}

.player-volume {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 30%;
    justify-content: flex-end;
}

#volume-bar {
    width: 100px;
    cursor: pointer;
}

@media (max-width: 768px) {
    .container {
        flex-direction: column;
    }

    .sidebar {
        width: 100%;
        height: auto;
    }

    .player {
        flex-direction: column;
        height: auto;
        padding: 10px;
        gap: 10px;
    }

    .player-track, .player-volume {
        width: 100%;
    }

    .player-controls {
        flex-direction: column;
    }

    #progress-bar {
        width: 100%;
    }
}</style></head><body><!DOCTYPE html>
<html lang="pl">

<head>

<body>

						d="M12 0C5.37 0 0 5.37 0 12s5.37 12 12 12 12-5.37 12-12S18.63 0 12 0zm3.66 9.64c-.23-.39-.61-.62-1.01-.62-.57 0-1.07.34-1.36.88-.18.35-.3.73-.3 1.16 0 .57.46 1.04 1.02 1.04.43 0 .83-.18 1.14-.53.42-.48.45-1.2.07-1.68zM12.02 5.5c-.25-.4-.66-.63-1.09-.63-.61 0-1.15.36-1.46.94-.19.37-.32.76-.32 1.2 0 .61.49 1.1 1.1 1.1.46 0 .89-.19 1.2-.56.45-.51.48-1.28.08-1.75zm-2.68 7.47c-.21-.37-.56-.59-.93-.59-.53 0-1.01.32-1.28.82-.17.34-.28.7-.28 1.07 0 .54.44.99.98.99.4 0 .78-.17 1.06-.5.4-.45.42-1.16.05-1.59z" />
					</svg>
				<h2>Spotify</h2>
			</div>
			<nav class="nav-menu">
				<ul>
					<li><a href="#" class="active"><ŕ Strona gBówna</a></li>

		</main>
		<footer class="player">
			<div class="player-track">
				<img id="current-cover" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1MCIgaGVpZ2h0PSI1MCIgZmlsbD0iIzI4MjgyOCI+PHJlY3Qgd2lkdGg9IjUwIiBoZWlnaHQ9IjUwIiByeD0iNCIvPjwvc3ZnPg==" alt="Cover">

				<input type="range" id="progress-bar" min="0" max="100" value="0">
				<span id="current-time">0:00</span>
				<span id="duration">0:00</span>
			</div>
			<div class="player-volume">
				<span>=
</span>
				<input type="range" id="volume-bar" min="0" max="1" step="0.01" value="1">
            </div>
		</footer>
	</div>
	<script src="script.js"></script>
</body>

</html><script type="text/javascript">const uploadBtn = document.getElementById('upload-btn');
const fileInput = document.getElementById('file-input');
const trackList = document.getElementById('track-list');
const playPauseBtn = document.getElementById('play-pause-btn');
const prevBtn = document.getElementById('prev-btn');
const nextBtn = document.getElementById('next-btn');
const progressBar = document.getElementById('progress-bar');
const volumeBar = document.getElementById('volume-bar');
const currentTime = document.getElementById('current-time');
const duration = document.getElementById('duration');
const currentTrackTitle = document.getElementById('current-track');
const currentArtist = document.getElementById('current-artist');
const currentCover = document.getElementById('current-cover');

let audio = new Audio();
let tracks = [];
let currentTrackIndex = -1;
let isPlaying = false;

function formatTime(seconds) {
  const min = Math.floor(seconds / 60);
  const sec = Math.floor(seconds % 60).toString().padStart(2, '0');
  return `${min}:${sec}`;
}

function createTrackElement(track, index) {
  const div = document.createElement('div');
  div.className = 'track';
  div.dataset.index = index;
  div.innerHTML = `
        <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1MCIgaGVpZ2h0PSI1MCIgZmlsbD0iIzI4MjgyOCI+PHJlY3Qgd2lkdGg9IjUwIiBoZWlnaHQ9IjUwIiByeD0iNCIvPjwvc3ZnPg==" alt="Cover">
        <div class="track-info">
            <h4>${track.title}</h4>
            <p>Unknown Artist</p>
        </div>
        <span class="duration">${track.duration || '0:00'}</span>
    `;
  div.addEventListener('click', () => {
    loadTrack(index);
    playTrack();
  });
  return div;
}

function updateTrackList() {
  trackList.innerHTML = '';
  tracks.forEach((track, index) => {
    trackList.appendChild(createTrackElement(track, index));
  });
}

function loadTrack(index) {
  if (index < 0 || index >= tracks.length) return;
  audio.src = tracks[index].src;
  currentTrackTitle.textContent = tracks[index].title;
  currentArtist.textContent = 'Unknown Artist';
  currentTrackIndex = index;
  audio.load();
  audio.onloadedmetadata = () => {
    duration.textContent = formatTime(audio.duration);
    progressBar.max = audio.duration;
  };
}

function playTrack() {
  audio.play();
  isPlaying = true;
  playPauseBtn.textContent = 'ř';
}

function pauseTrack() {
  audio.pause();
  isPlaying = false;
  playPauseBtn.textContent = '¶';
}

uploadBtn.addEventListener('click', () => {
  fileInput.click();
});

fileInput.addEventListener('change', () => {
  const files = Array.from(fileInput.files);
  files.forEach(file => {
    const src = URL.createObjectURL(file);
    const track = {
      title: file.name,
      src: src,
      duration: '0:00'
    };
    tracks.push(track);
    const tempAudio = new Audio(src);
    tempAudio.onloadedmetadata = () => {
      track.duration = formatTime(tempAudio.duration);
      updateTrackList();
    };
  });
  fileInput.value = '';
  updateTrackList();
});

playPauseBtn.addEventListener('click', () => {
  if (isPlaying) {
    pauseTrack();
  } else if (currentTrackIndex !== -1) {
    playTrack();
  }
});

prevBtn.addEventListener('click', () => {
  if (currentTrackIndex > 0) {
    loadTrack(currentTrackIndex - 1);
    playTrack();
  }
});

nextBtn.addEventListener('click', () => {
  if (currentTrackIndex < tracks.length - 1) {
    loadTrack(currentTrackIndex + 1);
    playTrack();
  }
});

progressBar.addEventListener('input', () => {
  audio.currentTime = progressBar.value;
});

volumeBar.addEventListener('input', () => {
  audio.volume = volumeBar.value;
});

audio.addEventListener('timeupdate', () => {
  progressBar.value = audio.currentTime;
  currentTime.textContent = formatTime(audio.currentTime);
});

audio.addEventListener('ended', () => {
  if (currentTrackIndex < tracks.length - 1) {
    loadTrack(currentTrackIndex + 1);
    playTrack();
  } else {
    pauseTrack();
  }
});</script></body><html>
