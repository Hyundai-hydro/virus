<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tester Częstotliwości Odświeżania</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      padding: 50px;
      margin: 0;
      background: linear-gradient(to right, #74ebd5, #ACB6E5);
      color: #2c3e50;
    }

    h1 {
      font-size: 2em;
      margin-bottom: 10px;
    }

    #frame {
      width: 100%;
      height: 100px;
      background-color: #3498db;
      margin: 30px 0;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% {
        background-color: #3498db;
      }

      50% {
        background-color: #5dade2;
      }

      100% {
        background-color: #3498db;
      }
    }

    #result {
      font-size: 24px;
      font-weight: bold;
      margin-top: 20px;
    }

    button {
      padding: 12px 30px;
      font-size: 16px;
      cursor: pointer;
      background-color: #27ae60;
      border: none;
      color: white;
      border-radius: 25px;
      transition: background-color 0.3s ease, transform 0.2s ease;
    }

    button:hover {
      background-color: #219150;
      transform: scale(1.05);
    }

    /* === ŁADOWANIE POPUP === */
    #loadingModal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.6);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .loading-box {
      background: #fff;
      color: #2c3e50;
      padding: 30px 40px;
      border-radius: 15px;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.3);
      width: 90%;
      max-width: 400px;
      animation: fadeIn 0.5s ease-in-out;
    }

    .loading-box p {
      font-size: 18px;
      margin: 15px 0;
      opacity: 0;
      animation: fadeText 0.5s forwards;
    }

    .loading-box p:nth-child(1) {
      animation-delay: 0.3s;
    }

    .loading-box p:nth-child(2) {
      animation-delay: 1s;
    }

    .loading-box p:nth-child(3) {
      animation-delay: 1.7s;
    }

    .loading-box p:nth-child(4) {
      animation-delay: 2.4s;
    }

    @keyframes fadeIn {
      from {
        transform: scale(0.8);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes fadeText {
      to {
        opacity: 1;
      }
    }
  </style>
</head>

<body>
  <h1>Tester Częstotliwości Odświeżania</h1>
  <p>Wciśnij przycisk, aby rozpocząć testowanie częstotliwości odświeżania Twojego monitora.</p>

  <div id="frame"></div>
  <p id="result">Częstotliwość odświeżania: - Hz</p>

  <button onclick="startTest()">Rozpocznij test</button>

  <!-- ŁADOWANIE MODAL -->
  <div id="loadingModal">
    <div class="loading-box" id="loadingBox">
      <p id="step1">Trwa obliczanie…</p>
      <p id="step2">Sprawdzanie rozmiaru okna…</p>
      <p id="step3">Analiza systemu…</p>
      <p id="step4">Przygotowywanie testu…</p>
    </div>
  </div>

  <script>
    let lastTimestamp = 0;
    let frames = 0;
    let hz = 0;
    let testRunning = false;
    const resultEl = document.getElementById('result');
    const modal = document.getElementById('loadingModal');
    const step2 = document.getElementById('step2');
    const step3 = document.getElementById('step3');

    function startTest() {
      if (testRunning) return;

      testRunning = true;
      resultEl.textContent = 'Częstotliwość odświeżania: - Hz';
      modal.style.display = 'flex';

      // Ustaw prawdziwe dane z opóźnieniem animacyjnym
      setTimeout(() => {
        step2.textContent = `Sprawdzanie rozmiaru okna… ${window.innerWidth}x${window.innerHeight}px`;
      }, 1000);

      setTimeout(() => {
        const ua = navigator.userAgent;
        const platform = navigator.platform;
        step3.textContent = `Analiza systemu… ${platform}, ${ua}`;
      }, 1700);

      // Zamknij popup po 3s i rozpocznij test
      setTimeout(() => {
        modal.style.display = 'none';
        frames = 0;
        hz = 0;
        lastTimestamp = performance.now();
        requestAnimationFrame(measureHz);
      }, 3000);
    }

    function measureHz(timestamp) {
      frames++;

      if (timestamp - lastTimestamp >= 1000) {
        hz = frames;
        frames = 0;
        lastTimestamp = timestamp;
        resultEl.textContent = 'Częstotliwość odświeżania: ' + hz + ' Hz';
      }

      if (testRunning) {
        requestAnimationFrame(measureHz);
      }
    }
  </script>
</body>

</html>
