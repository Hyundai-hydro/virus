<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Custom Player +++ • Naprawiony Play</title>
  <style>
    :root {
      --bg: #090912;
      --card: #11111c;
      --accent: #c084fc;
      --accent-dark: #a855f7;
      --text: #e5e7ff;
      --muted: #94a3b8;
      --progress: #c084fc;
      --slider-thumb: #c084fc;
      --slider-track: #1e1e38;
    }
    [data-theme="light"] {
      --bg: #f0f0f8;
      --card: #ffffff;
      --accent: #7c3aed;
      --accent-dark: #6d28d9;
      --text: #1a1a3a;
      --muted: #6b7280;
      --progress: #7c3aed;
      --slider-thumb: #7c3aed;
      --slider-track: #e5e7eb;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family:system-ui, sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:12px;
    }
    .player {
      width:100%;
      max-width:620px;
      background:var(--card);
      border-radius:20px;
      overflow:hidden;
      box-shadow:0 20px 70px rgba(0,0,0,.7);
      border:1px solid #1e1e3a;
    }
    .artwork-wrap {
      position:relative;
      height:300px;
      background:linear-gradient(135deg,#1a1735,#0b0a1f);
      cursor:pointer;
    }
    .artwork { width:100%; height:100%; object-fit:cover; opacity:.92; display:none; }
    .no-cover {
      position:absolute; inset:0;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      font-size:1.6rem; opacity:.25; letter-spacing:1px; font-weight:300;
    }
    .no-cover .note { font-size:3.8rem; margin-bottom:6px; }
    .info { padding:18px 24px 8px; text-align:center; }
    .title { font-size:1.4rem; font-weight:600; margin-bottom:4px; }
    .artist { color:var(--muted); font-size:1rem; }
    .time { display:flex; justify-content:space-between; padding:0 24px; font-size:.82rem; color:var(--muted); margin:8px 0 4px; }
    .progress-container { height:7px; background:var(--slider-track); margin:0 24px 14px; border-radius:4px; cursor:pointer; }
    .progress { height:100%; width:0; background:var(--progress); border-radius:4px; }
    .controls {
      display:flex; flex-wrap:wrap; justify-content:center; gap:16px; padding:0 20px 16px; align-items:center;
    }
    .btn {
      min-width:44px; height:44px; padding:0 12px; border-radius:999px;
      background:rgba(192,132,252,.12); color:var(--accent); border:none;
      font-size:1.1rem; cursor:pointer; transition:all .22s;
      display:flex; align-items:center; justify-content:center;
    }
    .btn:hover { background:rgba(192,132,252,.28); transform:scale(1.05); }
    .btn.big {
      min-width:68px; height:68px; font-size:2.1rem;
      background:linear-gradient(145deg,var(--accent),var(--accent-dark));
      color:white; box-shadow:0 8px 30px rgba(192,132,252,.35);
    }
    .btn.active { background:var(--accent); color:white; }
    .speed-btn.active { background:var(--accent); color:white; font-weight:bold; }
    .volume-area { padding:0 20px 16px; display:flex; flex-direction:column; gap:10px; }
    .volume-row, .booster-row { display:flex; align-items:center; gap:12px; justify-content:center; }
    input[type=range] {
      width:140px; height:8px; background:var(--slider-track); border-radius:4px; -webkit-appearance:none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance:none; width:20px; height:20px; border-radius:50%;
      background:var(--slider-thumb); cursor:pointer; border:2px solid var(--card);
    }
    .settings { flex-wrap:wrap; justify-content:center; gap:14px; font-size:.9rem; }
    .playlist {
      max-height:360px;
      overflow-y:auto;
      padding:10px 16px 20px;
      border-top:1px solid #1e1e3a;
      font-size:0.94rem;
    }
    .playlist-item {
      padding:10px 14px;
      border-radius:10px;
      margin-bottom:6px;
      background:rgba(30,30,60,.5);
      cursor:pointer;
      transition:all .18s;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
    }
    .playlist-item:hover { background:rgba(60,60,90,.6); }
    .playlist-item.active { background:rgba(192,132,252,.28); font-weight:500; }
    .playlist-item .info { flex:1; overflow:hidden; }
    .playlist-item .title { font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .playlist-item .meta { font-size:0.82rem; color:var(--muted); white-space:nowrap; }
    .drop-area { margin:16px 20px; padding:32px 16px; text-align:center; border:2px dashed var(--muted); border-radius:14px; transition:all .3s; color:var(--muted); cursor:pointer; }
    .drop-area:hover, .drop-area.active { border-color:var(--accent); background:rgba(192,132,252,.08); color:var(--accent); }
    .drop-area .icon { font-size:2.6rem; margin-bottom:8px; opacity:.7; }
    .error-toast { position:fixed; bottom:16px; left:50%; transform:translateX(-50%); background:#ef4444; color:white; padding:10px 20px; border-radius:8px; opacity:0; transition:opacity .3s; z-index:100; }
    .error-toast.show { opacity:1; }
    @media (max-width:520px) {
      .player { max-width:100%; border-radius:16px; }
      .artwork-wrap { height:240px; }
      .btn { min-width:42px; height:42px; font-size:1rem; padding:0 10px; }
      .btn.big { min-width:62px; height:62px; font-size:1.9rem; }
      .controls { gap:12px; padding:0 16px 12px; }
      input[type=range] { width:120px; }
      .playlist { max-height:220px; }
    }
  </style>
</head>
<body data-theme="dark">
<div class="player" id="player">
  <div class="artwork-wrap" id="artworkWrap">
    <div class="no-cover">
      <div class="note">♪</div>
      NO COVER
    </div>
    <img class="artwork" id="artwork" src="" alt="">
    <audio id="media" preload="auto" crossorigin="anonymous"></audio>
    <canvas class="wave" id="waveform" width="560" height="90"></canvas>
    <canvas class="eq" id="equalizer" width="180" height="60"></canvas>
  </div>
  <div class="info">
    <div class="title" id="title">— brak utworu —</div>
    <div class="artist" id="artist"></div>
  </div>
  <div class="time">
    <span id="current">0:00</span>
    <span id="duration">0:00</span>
  </div>
  <div class="progress-container" id="progressCont">
    <div class="progress" id="progress"></div>
  </div>
  <div class="controls">
    <button class="btn" id="themeBtn" title="Motyw">🌙</button>
    <button class="btn" id="shuffle" title="Losowo">🔀</button>
    <button class="btn" id="loop" title="Loop">🔂</button>
    <button class="btn" id="prev" title="Poprzedni">⏮</button>
    <button class="btn big" id="playPause" title="Play / Pause">▶</button>
    <button class="btn" id="next" title="Następny">⏭</button>
    <button class="btn" id="mute" title="Wycisz">🔇</button>
    <button class="btn" id="fullscreen" title="Pełny ekran">⛶</button>
  </div>
  <div class="volume-area">
    <div class="volume-row">
      <span style="font-size:1.3rem;">🔈</span>
      <input type="range" id="volume" min="0" max="1" step="0.01" value="0.8"/>
      <span style="font-size:1.3rem;">🔊</span>
    </div>
    <div class="settings">
      <label title="Wzmacniacz">
        <input type="checkbox" id="boosterCheck"> Booster
      </label>
      <span style="font-size:.75rem;color:#ef4444;">>2× = clipping!</span>
    </div>
    <div id="boosterRow" style="display:none;" class="booster-row">
      <span>×</span>
      <input type="range" id="booster" min="1" max="4" step="0.1" value="1"/>
      <span id="boostVal">1.0</span>
    </div>
  </div>
  <div class="controls" id="speedControls">
    <button class="btn speed-btn" id="speed05" data-rate="0.5">0.5×</button>
    <button class="btn speed-btn active" id="speed1" data-rate="1">1×</button>
    <button class="btn speed-btn" id="speed15" data-rate="1.5">1.5×</button>
    <button class="btn speed-btn" id="speed2" data-rate="2">2×</button>
  </div>
  <div class="drop-area" id="dropArea">
    <span class="icon">📥</span>
    <div>Upuść pliki tutaj</div>
    <div style="margin-top:6px;font-size:.88rem;opacity:.7;">
      1 plik = od razu gra • wiele = dodaje do listy
    </div>
  </div>
  <input type="file" id="fileInput" multiple accept="audio/*" style="display:none;"/>
  <div class="playlist" id="playlist"></div>
</div>
<div class="error-toast" id="errorToast"></div>

<script>
// ────────────────────────────────────────────────
const playerEl = document.getElementById('player');
const media = document.getElementById('media');
const artwork = document.getElementById('artwork');
const titleEl = document.getElementById('title');
const artistEl = document.getElementById('artist');
const currentEl = document.getElementById('current');
const durationEl = document.getElementById('duration');
const progress = document.getElementById('progress');
const progressCont = document.getElementById('progressCont');
const playPause = document.getElementById('playPause');
const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');
const shuffleBtn = document.getElementById('shuffle');
const loopBtn = document.getElementById('loop');
const fullscreenBtn = document.getElementById('fullscreen');
const muteBtn = document.getElementById('mute');
const volume = document.getElementById('volume');
const boosterCheck = document.getElementById('boosterCheck');
const boosterRow = document.getElementById('boosterRow');
const booster = document.getElementById('booster');
const boostVal = document.getElementById('boostVal');
const dropArea = document.getElementById('dropArea');
const fileInput = document.getElementById('fileInput');
const playlistEl = document.getElementById('playlist');
const themeBtn = document.getElementById('themeBtn');

let playlist = [];
let currentIndex = -1;
let isShuffle = false;
let isLoop = false;
let audioCtx, analyser, gainNode, boosterGain;
let currentURL = null;
let currentSpeed = 1.0;

// Najważniejsza linia – naturalna zmiana tempa (jak w Audacity)
media.preservesPitch = true;

function showError(msg) {
  const toast = document.getElementById('errorToast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 5000);
}

function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const source = audioCtx.createMediaElementSource(media);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  gainNode = audioCtx.createGain();
  boosterGain = audioCtx.createGain();
  source.connect(analyser);
  analyser.connect(gainNode);
  gainNode.connect(boosterGain);
  boosterGain.connect(audioCtx.destination);
}
initAudio();

function fmtTime(s) {
  if (isNaN(s) || s < 0) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + sec.toString().padStart(2, '0');
}

function updateUI() {
  const ct = media.currentTime || 0;
  const dur = media.duration || 0;
  currentEl.textContent = fmtTime(ct);
  durationEl.textContent = fmtTime(dur);
  progress.style.width = dur ? (ct / dur * 100) + '%' : '0%';
  playPause.textContent = media.paused ? '▶' : '⏸';
  muteBtn.textContent = media.muted ? '🔇' : '🔊';
  loopBtn.classList.toggle('active', isLoop);
  shuffleBtn.classList.toggle('active', isShuffle);
  if (!media.src) {
    titleEl.textContent = '— brak utworu —';
    artistEl.textContent = '';
  }
}

// ──── BEZPIECZNE REVOKOWANIE BLOBÓW ────────────────────────────────────────
function safeRevoke(url) {
  if (url && url.startsWith('blob:')) {
    try { URL.revokeObjectURL(url); } catch(e) {}
  }
}

// ──── POJEDYNCZY PLIK ──────────────────────────────────────────────────────
async function playSingleFile(url, filename = 'Plik z dysku') {
  try {
    media.pause();
    if (currentURL) safeRevoke(currentURL);
    currentURL = url;
    media.src = url;
    media.preservesPitch = true;           // ← kluczowa linia
    media.playbackRate = currentSpeed;
    media.load();
    titleEl.textContent = filename;
    artistEl.textContent = '';
    artwork.style.display = 'none';
    document.querySelector('.no-cover').style.opacity = '0.18';
    currentIndex = -1;
    playlist = [];
    renderPlaylist();
    await new Promise((resolve, reject) => {
      media.onloadedmetadata = resolve;
      media.onerror = () => reject(new Error(media.error?.message || 'Błąd ładowania'));
    });
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    updateUI();
    await media.play();
  } catch (err) {
    console.error('playSingleFile:', err);
    showError('Nie udało się odtworzyć: ' + err.message);
  }
}

// ──── Z PLAYLISTY ──────────────────────────────────────────────────────────
async function playTrack(index) {
  if (index < 0 || index >= playlist.length) return;
  const item = playlist[index];
  try {
    media.pause();
    media.src = item.url;
    media.preservesPitch = true;           // ← kluczowa linia
    media.playbackRate = currentSpeed;
    media.load();
    titleEl.textContent = item.title || item.name;
    artistEl.textContent = item.artist || '';
    artwork.style.display = 'none';
    document.querySelector('.no-cover').style.opacity = '0.18';
    currentIndex = index;
    renderPlaylist();
    await new Promise((resolve, reject) => {
      media.onloadedmetadata = resolve;
      media.onerror = () => reject(new Error(media.error?.message || 'Błąd ładowania'));
    });
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    updateUI();
    await media.play();
  } catch (err) {
    console.error('playTrack:', err);
    showError('Błąd odtwarzania: ' + err.message);
  }
}

// ──── OBSŁUGA WIELU PLIKÓW ─────────────────────────────────────────────────
function handleMultipleFiles(files) {
  if (!files?.length) return;
  const newItems = [];
  Array.from(files).forEach(file => {
    if (!file.type.startsWith('audio/')) {
      showError(`Pomijam ${file.name} – nie jest plikiem audio`);
      return;
    }
    const url = URL.createObjectURL(file);
    const format = file.type.split('/')[1]?.toUpperCase() || '?';
    newItems.push({
      name: file.name,
      url,
      title: file.name.replace(/\.[^/.]+$/, ""),
      artist: "",
      duration: file.duration || '?',
      format
    });
  });
  if (!newItems.length) return;
  const wasEmpty = playlist.length === 0;
  playlist = playlist.concat(newItems);
  renderPlaylist();
  if (wasEmpty || currentIndex < 0) {
    currentIndex = playlist.length - newItems.length;
    playTrack(currentIndex);
  } else {
    showError(`Dodano ${newItems.length} utworów`);
  }
}

// ──── RENDER PLAYLISTY ─────────────────────────────────────────────────────
function renderPlaylist() {
  playlistEl.innerHTML = '';
  playlist.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'playlist-item' + (i === currentIndex ? ' active' : '');
    const metaParts = [];
    if (item.artist) metaParts.push(item.artist);
    if (item.duration !== '?') metaParts.push(fmtTime(item.duration));
    metaParts.push(item.format);
    div.innerHTML = `
      <div class="info">
        <div class="title">${item.title || item.name}</div>
        <div class="meta">${metaParts.join(' • ')}</div>
      </div>
    `;
    div.onclick = () => playTrack(i);
    playlistEl.appendChild(div);
  });
  const active = playlistEl.querySelector('.active');
  if (active) active.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// ──── DROP I WCZYTYWANIE PLIKÓW ────────────────────────────────────────────
function handleGlobalDrop(e) {
  e.preventDefault();
  e.stopPropagation();
  dropArea.classList.remove('active');
  const files = e.dataTransfer.files;
  if (!files?.length) return;
  if (files.length === 1) {
    const file = files[0];
    if (!file.type.startsWith('audio/')) return showError('Tylko pliki audio');
    const url = URL.createObjectURL(file);
    playSingleFile(url, file.name);
  } else {
    handleMultipleFiles(files);
  }
}

function handleDragOver(e) {
  e.preventDefault();
  e.stopPropagation();
  dropArea.classList.add('active');
}

function handleDragLeave(e) {
  e.preventDefault();
  e.stopPropagation();
  dropArea.classList.remove('active');
}

['dragover', 'dragenter'].forEach(ev => {
  playerEl.addEventListener(ev, handleDragOver);
  dropArea.addEventListener(ev, handleDragOver);
});
['dragleave', 'drop'].forEach(ev => {
  playerEl.addEventListener(ev, handleDragLeave);
  dropArea.addEventListener(ev, handleDragLeave);
});
playerEl.addEventListener('drop', handleGlobalDrop);
dropArea.addEventListener('drop', handleGlobalDrop);
dropArea.onclick = () => fileInput.click();
fileInput.onchange = () => {
  if (fileInput.files?.length) {
    if (fileInput.files.length === 1) {
      const file = fileInput.files[0];
      const url = URL.createObjectURL(file);
      playSingleFile(url, file.name);
    } else {
      handleMultipleFiles(fileInput.files);
    }
  }
  fileInput.value = '';
};

// ──── PRZYCISKI PRĘDKOŚCI ──────────────────────────────────────────────────
document.querySelectorAll('.speed-btn').forEach(btn => {
  btn.onclick = () => {
    currentSpeed = parseFloat(btn.dataset.rate);
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (media.src) {
      media.playbackRate = currentSpeed;
      // preservesPitch już ustawione wcześniej – nie trzeba powtarzać
    }
  };
});

// ──── POZOSTAŁE PRZYCISKI ──────────────────────────────────────────────────
playPause.onclick = async () => {
  if (!media.src) return;
  try {
    if (media.paused) {
      if (audioCtx.state === 'suspended') await audioCtx.resume();
      await media.play();
    } else {
      media.pause();
    }
    updateUI();
  } catch (e) {
    showError('Play/pause error: ' + e.message);
  }
};

prevBtn.onclick = () => {
  if (playlist.length === 0) return;
  currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
  playTrack(currentIndex);
};

nextBtn.onclick = () => {
  if (playlist.length === 0) return;
  currentIndex = (currentIndex + 1) % playlist.length;
  playTrack(currentIndex);
};

shuffleBtn.onclick = () => { isShuffle = !isShuffle; updateUI(); };
loopBtn.onclick = () => { isLoop = !isLoop; updateUI(); };

themeBtn.onclick = () => {
  const cur = document.body.getAttribute('data-theme');
  document.body.setAttribute('data-theme', cur === 'dark' ? 'light' : 'dark');
  themeBtn.textContent = cur === 'dark' ? '☀️' : '🌙';
};

volume.oninput = () => gainNode.gain.value = volume.value;

boosterCheck.onchange = () => {
  boosterRow.style.display = boosterCheck.checked ? 'flex' : 'none';
  if (!boosterCheck.checked) boosterGain.gain.value = 1;
};

booster.oninput = () => {
  boosterGain.gain.value = booster.value;
  boostVal.textContent = booster.value;
};

media.ontimeupdate = updateUI;
media.onloadedmetadata = updateUI;
media.onplay = updateUI;
media.onpause = updateUI;
media.onended = () => {
  if (isLoop) {
    media.currentTime = 0;
    media.play().catch(() => {});
  } else if (currentIndex >= 0 && currentIndex < playlist.length - 1) {
    currentIndex++;
    playTrack(currentIndex);
  } else if (isShuffle && playlist.length > 1) {
    let next = Math.floor(Math.random() * playlist.length);
    while (next === currentIndex) next = Math.floor(Math.random() * playlist.length);
    currentIndex = next;
    playTrack(currentIndex);
  }
};

updateUI();
</script>
</body>
</html>
