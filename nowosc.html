<!DOCTYPE html>

<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Number Guesser – Totalny Chaos</title>
    <style>
        body { font-family: Comic Sans MS, sans-serif; text-align: center; background: #000; color: #0f0; }
        button { padding: 15px 30px; margin: 10px; background: #f00; color: #fff; border: none; cursor: pointer; }
        button:hover { background: #0ff; }
        input { padding: 10px; background: #333; color: #fff; border: 2px solid #0f0; }
        .warning { 
            display: none; 
            font-size: 80px; 
            color: red; 
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            animation: blink 0.5s infinite; 
        }
        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <h1>Zgadnij albo giń!</h1>
    <p>Wybierz tryb, dawaj:</p>
    <button onclick="startGame(1)">Tryb 1 (Chill)</button>
    <button onclick="startGame(2)">Tryb 2 (youtubeHub)</button>
    <button onclick="startGame(3)">Tryb 3 (Lagi)</button>
    <button onclick="startGame(4)">Tryb 4 (Masakra)</button>
    <button onclick="startGame(5)">Tryb 5 (WSZYSTKO)</button>

        <button onclick="checkGuess()">Sprawdź, kurde!</button>
        <p id="message"></p>

    <div id="warning" class="warning">KORZYSTAŁEM Z TELEFONU W SZKOLE</div>
    <script>
        let number, mode;
        function startGame(selectedMode) {
            mode = selectedMode;
            number = Math.floor(Math.random() * 100) + 1;
            document.getElementById("game").style.display = "block";
            document.getElementById("message").innerText = "Dawaj, zgaduj!";
        }
        function checkGuess() {
            const guess = parseInt(document.getElementById("guessInput").value);
            if (guess < number) {
                document.getElementById("message").innerText = "Za mało, ziom!";
            } else if (guess > number) {
                document.getElementById("message").innerText = "Za dużo, ogarnij!";
            } else {
                document.getElementById("message").innerText = "Zgadłeś, kurde!";
                endGame();
            }
